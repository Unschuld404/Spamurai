      /auth/app:
          get:
              summary: 'Authentifizierung einer App mit X-ACCESS-Key + X-API-Key Gewährt Zugriff auf die Daten.'
              description: 'Gibt ein Access-Token als JWT-Token zurück.'
              responses:
                  '200':
                      description: JWT-Token
                      content:
                          application/json:
                              schema:
                                  type: string
      /auth/user:
          get:
              summary: 'Authentifizierung eines Users mit Username/Passwort'
              description: "Gewährt Zugriff auf die Daten.\nGibt ein Access-Token als JWT-Token zurück."
              responses:
                  '200':
                      description: JWT-Token
                      content:
                          application/json:
                              schema:
                                  type: string
          post:
              summary: 'Authentifizierung eines Users mit Username/Passwort'
              responses:
                  '200':
                      description: JWT-Token
                      content:
                          application/json:
                              schema:
                                  type: string
              requestBody:
                  required: true
                  content:
                      application/json:
                          schema:
                              type: object
                              properties:
                                  username:
                                      type: string
                                      examples:
                                          - foo
                                  password:
                                      type: string
                                      examples:
                                          - bar
                      multipart/form-data:
                          schema:
                              type: object
                              properties:
                                  username:
                                      type: string
                                      examples:
                                          - foo
                                  password:
                                      type: string
                                      examples:
                                          - bar
